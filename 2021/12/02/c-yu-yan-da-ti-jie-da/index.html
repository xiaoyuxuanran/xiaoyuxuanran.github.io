<p>第一套第一题</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#include &lt;conio.h&gt;</span></span><br><span class="line"><span class="comment">#include &lt;stdio.h&gt;</span></span><br><span class="line">void fun(int a, int b, long *c)</span><br><span class="line">&#123;</span><br><span class="line">	*c=(a/10)*1000+(a%10)*10+b/10+(b%10)*100;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="title">NONO</span></span> (  )</span><br><span class="line">&#123;/* 本函数用于打开文件，输入数据，调用函数，输出数据，关闭文件。 */</span><br><span class="line">  FILE *rf, *wf ;</span><br><span class="line">  int i, a,b ; long c ;</span><br><span class="line"></span><br><span class="line">  rf = fopen(<span class="string">&quot;in1.dat&quot;</span>, <span class="string">&quot;r&quot;</span>) ;</span><br><span class="line">  wf = fopen(<span class="string">&quot;bc06.dat&quot;</span>,<span class="string">&quot;w&quot;</span>) ;</span><br><span class="line">  <span class="keyword">for</span>(i = 0 ; i &lt; 10 ; i++) &#123;</span><br><span class="line">    fscanf(rf, <span class="string">&quot;%d,%d&quot;</span>, &amp;a, &amp;b) ;</span><br><span class="line">    fun(a, b, &amp;c) ;</span><br><span class="line">    fprintf(wf, <span class="string">&quot;a=%d,b=%d,c=%ld\n&quot;</span>, a, b, c) ;</span><br><span class="line">  &#125;</span><br><span class="line">  fclose(rf) ;</span><br><span class="line">  fclose(wf) ;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="title">main</span></span>()</span><br><span class="line">&#123;  int  a,b; long  c; </span><br><span class="line">   <span class="built_in">printf</span>(<span class="string">&quot;Input a, b:&quot;</span>);</span><br><span class="line">   scanf(<span class="string">&quot;%d,%d&quot;</span>, &amp;a, &amp;b);</span><br><span class="line">   fun(a, b, &amp;c);</span><br><span class="line">   <span class="built_in">printf</span>(<span class="string">&quot;The result is: %ld\n&quot;</span>, c);</span><br><span class="line">   NONO();</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

pan class="string">&quot;\n\n%d! =%lf\n\n&quot;</span>, n, fun(n)) ;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

123;9804,<span class="string">&quot;Yuan Rui&quot;</span>,<span class="string">&#x27;F&#x27;</span>,93&#125;,</span><br><span class="line">       &#123;9805,<span class="string">&quot;Li Yanli&quot;</span>,<span class="string">&#x27;F&#x27;</span>,56&#125;</span><br><span class="line">      &#125;;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="title">main</span></span>()</span><br><span class="line">&#123;</span><br><span class="line">  int i,c=0;</span><br><span class="line">  <span class="built_in">float</span> ave,sum=0;</span><br><span class="line">  <span class="keyword">for</span> (i=0;i&lt;5;i++)</span><br><span class="line">  &#123;</span><br><span class="line">/***************found***************/  </span><br><span class="line">    sum+=s[i].score;</span><br><span class="line">/***************found***************/</span><br><span class="line">    <span class="keyword">if</span> (s[i].score&lt;60) c+=1;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="built_in">printf</span>(<span class="string">&quot;sum=%f \n&quot;</span>,sum);</span><br><span class="line">/***************found***************/</span><br><span class="line">  ave=sum/5.0;</span><br><span class="line">  <span class="built_in">printf</span>(<span class="string">&quot;average = %f \ncount= %d \n&quot;</span>,ave,c);</span><br><span class="line">  <span class="built_in">return</span>;</span><br><span class="line">  &#125;  </span><br></pre></td></tr></table></figure>
