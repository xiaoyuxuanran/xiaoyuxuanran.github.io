ss="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#include &lt;stdio.h&gt;</span></span><br><span class="line"><span class="comment">#define size 101</span></span><br><span class="line"><span class="comment">#define inf 32767</span></span><br><span class="line">typedef struct</span><br><span class="line">&#123;</span><br><span class="line">    int n,e;</span><br><span class="line">    int edge[size][size];</span><br><span class="line">&#125;mg;</span><br><span class="line"></span><br><span class="line">void init_mg(mg &amp;g)</span><br><span class="line">&#123;</span><br><span class="line">    g.n=g.e=0;</span><br><span class="line">    <span class="keyword">for</span> (int i = 1; i &lt; size; i++) &#123;</span><br><span class="line">        <span class="keyword">for</span> (int j = 0; j &lt; size; j++) &#123;</span><br><span class="line">            g.edge[i][j]=inf;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line">void input(mg &amp;g)</span><br><span class="line">&#123;</span><br><span class="line">    freopen(<span class="string">&quot;in.txt&quot;</span>,<span class="string">&quot;r&quot;</span>,stdin);</span><br><span class="line">    scanf(<span class="string">&quot;%d%d&quot;</span>,&amp;g.n,g.e);</span><br><span class="line">    <span class="keyword">for</span> (int i = 1; i &lt;= g.e ; i++) &#123;</span><br><span class="line">        int v1,v2,w;</span><br><span class="line">        scanf(<span class="string">&quot;%d%d%d&quot;</span>,&amp;v1,&amp;v2,w);</span><br><span class="line">        g.edge[v1][v2]=g.edge[v2][v1]=w;</span><br><span class="line">    &#125;</span><br><span class="line">    fclose(stdin);</span><br><span class="line">&#125;</span><br><span class="line">typedef struct &#123;</span><br><span class="line">    int vs,ve,w;</span><br><span class="line">&#125;eg;</span><br><span class="line">void sort(eg g[],int e)</span><br><span class="line">&#123;</span><br><span class="line">    <span class="keyword">for</span> (int i = 1; i &lt; e; i++) &#123;</span><br><span class="line">        <span class="keyword">for</span> (int j = i+1; j &lt;= e; j++) &#123;</span><br><span class="line">            <span class="keyword">if</span>(g[i].w&gt;g[j].w)</span><br><span class="line">            &#123;</span><br><span class="line">                eg t=g[i];</span><br><span class="line">                g[i]=g[j];</span><br><span class="line">                g[j]=t;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line">void kruskal(mg g)</span><br><span class="line">&#123;</span><br><span class="line">    eg eg[size];</span><br><span class="line">    int ei=0;</span><br><span class="line">    <span class="keyword">for</span>(int i=1;i&lt;=g.n;i++)</span><br><span class="line">        <span class="keyword">for</span>(int j=1;j&lt;i;j++)</span><br><span class="line">            <span class="keyword">if</span>(g.edge[i][j]&lt;inf)</span><br><span class="line">            &#123;</span><br><span class="line">                ei++;</span><br><span class="line">                eg[ei].vs=i;</span><br><span class="line">                eg[ei].ve=j;</span><br><span class="line">                eg[ei].w=g.edge[i][j];</span><br><span class="line">            &#125;</span><br><span class="line">            sort(eg,ei);</span><br><span class="line">    int sn[size]=&#123;0&#125;;</span><br><span class="line">    <span class="keyword">for</span>(int i=1;i&lt;g.n;i++)</span><br><span class="line">        sn[i]=i;</span><br><span class="line">    int k=0;</span><br><span class="line">    ei=1;</span><br><span class="line">    <span class="keyword">while</span>(1)</span><br><span class="line">    &#123;</span><br><span class="line">        int vs,ve,w,sn1,sn2;</span><br><span class="line">        vs=eg[ei].vs;</span><br><span class="line">        ve=eg[ei].ve;</span><br><span class="line">        w=eg[ei].w;</span><br><span class="line">        sn1=sn[vs];</span><br><span class="line">        sn2=sn[ve];</span><br><span class="line">        <span class="keyword">if</span>(sn1!=sn2)</span><br><span class="line">        &#123;</span><br><span class="line">            <span class="built_in">printf</span>(<span class="string">&quot;(%d,%d)(%d),&quot;</span>,vs,ve,w);</span><br><span class="line">            k++;</span><br><span class="line">            <span class="keyword">if</span>(k==g.n-1) <span class="built_in">break</span>;</span><br><span class="line">            <span class="keyword">for</span>(int i=1;i&lt;=g.n;i++)</span><br><span class="line">            &#123;</span><br><span class="line">                <span class="keyword">if</span>(sn[i]==sn2) sn[i]=sn1;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        ei++;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line">int <span class="function"><span class="title">main</span></span>()</span><br><span class="line">&#123;</span><br><span class="line">    mg g;</span><br><span class="line">    init_mg(g);</span><br><span class="line">    input(g);</span><br><span class="line">    kruskal(g);</span><br><span class="line">    <span class="built_in">return</span> 0;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
