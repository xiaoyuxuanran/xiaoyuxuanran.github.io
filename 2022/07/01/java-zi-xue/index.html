e">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br><span class="line">144</span><br><span class="line">145</span><br><span class="line">146</span><br><span class="line">147</span><br><span class="line">148</span><br><span class="line">149</span><br><span class="line">150</span><br><span class="line">151</span><br><span class="line">152</span><br><span class="line">153</span><br><span class="line">154</span><br><span class="line">155</span><br><span class="line">156</span><br><span class="line">157</span><br><span class="line">158</span><br><span class="line">159</span><br><span class="line">160</span><br><span class="line">161</span><br><span class="line">162</span><br><span class="line">163</span><br><span class="line">164</span><br><span class="line">165</span><br><span class="line">166</span><br><span class="line">167</span><br></pre></td><td class="code"><pre><span class="line">package stack;</span><br><span class="line">import javax.management.RuntimeErrorException;</span><br><span class="line"></span><br><span class="line">public class ArrayStack &#123;</span><br><span class="line">    /* </span><br><span class="line">     * 线性结构:是一个有序数据元素的集合</span><br><span class="line">     * 线性表，数组，栈，队列。。</span><br><span class="line">     * </span><br><span class="line">     * 非线性结构：树，图，二维数组</span><br><span class="line">     */</span><br><span class="line"></span><br><span class="line">    /* </span><br><span class="line">     * 栈</span><br><span class="line">     */</span><br><span class="line">     /* 栈的大小 */</span><br><span class="line">    </span><br><span class="line">    private int maxStack;</span><br><span class="line">    /* 数组来模拟栈 */</span><br><span class="line">    private int[] stack;</span><br><span class="line"></span><br><span class="line">    /* 栈顶 */</span><br><span class="line">    private int top = -1;</span><br><span class="line"></span><br><span class="line">    public  ArrayStack(int maxStack)&#123;</span><br><span class="line">        this.maxStack = maxStack;</span><br><span class="line">        stack = new int[maxStack];</span><br><span class="line">    &#125;</span><br><span class="line">    /* </span><br><span class="line">     * 1.压栈</span><br><span class="line">     * 2.弹栈</span><br><span class="line">     * 3.判断是否是空栈</span><br><span class="line">     * 4.当前栈中是否满栈</span><br><span class="line">     */</span><br><span class="line"></span><br><span class="line">     /* 判断是否满栈 */</span><br><span class="line">    public boolean <span class="function"><span class="title">isFull</span></span>()</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="built_in">return</span> this.top == this.maxStack-1;</span><br><span class="line">    &#125;</span><br><span class="line">    /* 判断是否空栈 */</span><br><span class="line"></span><br><span class="line">    public boolean <span class="function"><span class="title">isEmpty</span></span>()</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="built_in">return</span> this.maxStack == -1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    /* </span><br><span class="line">     * 压栈</span><br><span class="line">     */</span><br><span class="line">    public void push(int val)</span><br><span class="line">    &#123;</span><br><span class="line">        //是否栈满</span><br><span class="line">        <span class="keyword">if</span>(isFull())&#123;</span><br><span class="line">            throw new RuntimeException(<span class="string">&quot;此栈已满&quot;</span>);</span><br><span class="line">        &#125;</span><br><span class="line">        top++;</span><br><span class="line">        stack[top] = val;</span><br><span class="line">    &#125;</span><br><span class="line">    /* </span><br><span class="line">     * 出栈（弹栈）</span><br><span class="line">     */</span><br><span class="line">    public int <span class="function"><span class="title">pop</span></span>()</span><br><span class="line">    &#123;</span><br><span class="line">        //如果栈中是空</span><br><span class="line">        <span class="keyword">if</span>(isEmpty())</span><br><span class="line">        &#123;</span><br><span class="line">            throw new RuntimeException(<span class="string">&quot;此栈已空&quot;</span>);</span><br><span class="line">        &#125;</span><br><span class="line">        int value = stack[top];</span><br><span class="line">        top--;</span><br><span class="line">        <span class="built_in">return</span> value;</span><br><span class="line">    &#125;</span><br><span class="line">    /* </span><br><span class="line">     * 查看栈中所有元素</span><br><span class="line">     */</span><br><span class="line">    public void <span class="function"><span class="title">list</span></span>()&#123;</span><br><span class="line">        //判断是否栈空</span><br><span class="line">        <span class="keyword">if</span>(isEmpty())</span><br><span class="line">        &#123;</span><br><span class="line">            throw new RuntimeException(<span class="string">&quot;此栈已空，未找到数据&quot;</span>);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">for</span>(int i = 0; i&lt;stack.length;i++)</span><br><span class="line">        &#123;</span><br><span class="line">            System.out.printf(<span class="string">&quot;stack[%d]=%d\n&quot;</span>,i,stack[i]);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    /* </span><br><span class="line">     * 元素个数</span><br><span class="line">     */</span><br><span class="line">    public int <span class="function"><span class="title">length</span></span>()</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="built_in">return</span> this.top+1;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    /* </span><br><span class="line">     * 判断是否是一个运算符</span><br><span class="line">     *只针对加减乘除</span><br><span class="line">     */</span><br><span class="line">    public boolean isOper(char v)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="built_in">return</span> v==<span class="string">&#x27;+&#x27;</span>||v==<span class="string">&#x27;/&#x27;</span>||v==<span class="string">&#x27;*&#x27;</span>||v==<span class="string">&#x27;-&#x27;</span>;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    /* </span><br><span class="line">     * 判断运算符优先级</span><br><span class="line">     * 使用数字表示优先级，数字越大优先级就越大</span><br><span class="line">     */</span><br><span class="line">    public int priority(int oper)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">if</span>(oper==<span class="string">&#x27;*&#x27;</span>||oper==<span class="string">&#x27;/&#x27;</span>)</span><br><span class="line">        &#123;</span><br><span class="line">            <span class="built_in">return</span> 1;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">else</span> <span class="keyword">if</span>(oper==<span class="string">&#x27;+&#x27;</span>||oper==<span class="string">&#x27;-&#x27;</span>)</span><br><span class="line">        &#123;</span><br><span class="line">            <span class="built_in">return</span> 0;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">else</span>&#123;</span><br><span class="line">            <span class="built_in">return</span> -1;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    /* </span><br><span class="line">     * 获取栈顶数据</span><br><span class="line">     */</span><br><span class="line">    public int <span class="function"><span class="title">peek</span></span>()</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="built_in">return</span> this.stack[top];</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    /* </span><br><span class="line">     * 获取栈容量</span><br><span class="line">     */</span><br><span class="line">    public int <span class="function"><span class="title">stackLength</span></span>()</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="built_in">return</span> this.stack.length;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    /* </span><br><span class="line">     * 计算两数相加之和的结果</span><br><span class="line">     */</span><br><span class="line">    public int calculate(int num1,int num2,int oper)</span><br><span class="line">    &#123;</span><br><span class="line">        //计算结果</span><br><span class="line">        int result = 0;</span><br><span class="line">        switch(oper)&#123;</span><br><span class="line">            <span class="keyword">case</span> <span class="string">&#x27;+&#x27;</span>:</span><br><span class="line">                result = num1+num2;</span><br><span class="line">                <span class="built_in">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="string">&#x27;-&#x27;</span>:</span><br><span class="line">                result = num2-num1;</span><br><span class="line">                <span class="built_in">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="string">&#x27;*&#x27;</span>:</span><br><span class="line">                result = num2*num1;</span><br><span class="line">                <span class="built_in">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="string">&#x27;/&#x27;</span>:</span><br><span class="line">                result = num2/num1;</span><br><span class="line">                <span class="built_in">break</span>;</span><br><span class="line">            default:</span><br><span class="line">                <span class="built_in">break</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="built_in">return</span> result;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
<p>回文数的判断</p>

"line">         * 回文: aba racecar</span><br><span class="line">         * 通过上线以数组模拟栈来判断一个字符串是否是一个回文数据</span><br><span class="line">         */</span><br><span class="line">        System.out.println(detecation(<span class="string">&quot;hello&quot;</span>));</span><br><span class="line">    </span><br><span class="line">    &#125;</span><br><span class="line">    public static boolean detecation(String val)</span><br><span class="line">    &#123;</span><br><span class="line">        /* </span><br><span class="line">         * 初始化栈对象</span><br><span class="line">         */</span><br><span class="line">        ArrayStack arrayStack = new ArrayStack(10);</span><br><span class="line"></span><br><span class="line">        /* </span><br><span class="line">         * 获取字符串长度</span><br><span class="line">         */</span><br><span class="line">        int length = val.length();</span><br><span class="line">        /* </span><br><span class="line">         * 把字符串数据逐次获取字符压栈到数组中</span><br><span class="line">         */</span><br><span class="line">        <span class="keyword">for</span>(int i = 0;i&lt;length;i++)</span><br><span class="line">        &#123;</span><br><span class="line">            arrayStack.push(val.charAt(i));</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        String newval = <span class="string">&quot;&quot;</span>;</span><br><span class="line">        int length1 = arrayStack.length();</span><br><span class="line">        <span class="keyword">for</span>(int i =0;i&lt;length1;i++)</span><br><span class="line">        &#123;</span><br><span class="line">            <span class="keyword">if</span>(!arrayStack.isEmpty())</span><br><span class="line">            &#123;</span><br><span class="line">                char pop = (char) arrayStack.pop();</span><br><span class="line">                newval = newval+pop;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span>(val.equals(newval))</span><br><span class="line">        &#123;</span><br><span class="line">            <span class="built_in">return</span> <span class="literal">true</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="built_in">return</span> <span class="literal">false</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
<p>计算数学表达式(栈实现)</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br></pre></td><td class="code"><pre><span class="line">package stack;</span><br><span class="line"></span><br><span class="line">public class TestStack &#123;</span><br><span class="line">    public static void main(String[] args) &#123;</span><br><span class="line">        String str = <span class="string">&quot;4+3*2&quot;</span>;</span><br><span class="line">        /* </span><br><span class="line">         * 1.遍历每一个字符，获取每一个字符</span><br><span class="line">         * 2.判断当前字符是一个运算符还是一个数字</span><br><span class="line">         * 3.把数字存放在数字栈中，吧运算符放在运算符栈</span><br><span class="line">         * 4.运算符栈：如果是一个空栈，那么运算符直接入栈</span><br><span class="line">         * 如果运算符栈中已经存在了其他运算符，就需要先对比运算符优先级</span><br><span class="line">         * 新进来的运算符如果小于原栈中运算符，那么需要把原运算符弹栈</span><br><span class="line">         * 数字栈中的数字进行弹栈，进行运算，运算后的结果重新放入数字栈中，新运算符入栈</span><br><span class="line">         * </span><br><span class="line">         * 如果新运算符优先级大于原栈中运算符，那么，新的符号直接入栈</span><br><span class="line">         * </span><br><span class="line">         */</span><br><span class="line">        ArrayStack numStack = new ArrayStack(10);</span><br><span class="line">        ArrayStack symbolStack = new ArrayStack(10);</span><br><span class="line">        /* </span><br><span class="line">         * 获取字符串长度</span><br><span class="line">         */</span><br><span class="line">        int temp1=1;</span><br><span class="line">        int temp2 =0;</span><br><span class="line">        int symbolChar = 0;</span><br><span class="line">        int result =0;</span><br><span class="line">        int length = str.length();</span><br><span class="line"></span><br><span class="line">        String values = <span class="string">&quot;&quot;</span>;</span><br><span class="line">        <span class="keyword">for</span>(int i=0;i&lt;length;i++)</span><br><span class="line">        &#123;</span><br><span class="line">            char c = str.charAt(i);</span><br><span class="line">            /* </span><br><span class="line">             * 是否是一个运算符</span><br><span class="line">             */</span><br><span class="line">            <span class="keyword">if</span>(symbolStack.isOper(c))&#123;</span><br><span class="line">                /* </span><br><span class="line">                 * 如果不是一个空符号栈</span><br><span class="line">                 */</span><br><span class="line">                <span class="keyword">if</span>(!symbolStack.isEmpty())&#123;</span><br><span class="line">                    /* </span><br><span class="line">                     * 比较运算符的优先级</span><br><span class="line">                     */</span><br><span class="line">                    <span class="keyword">if</span>(symbolStack.priority(c)&lt;=symbolStack.priority(symbolStack.peek()))&#123;</span><br><span class="line">                        /* </span><br><span class="line">                         * 去符号栈中获取栈顶的符号</span><br><span class="line">                         * 去数字栈中获取两个数字</span><br><span class="line">                         */</span><br><span class="line">                        temp1=numStack.pop();</span><br><span class="line">                        temp2=numStack.pop();</span><br><span class="line">                        symbolChar=symbolStack.pop();</span><br><span class="line">                        result=numStack.calculate(temp1, temp2, symbolChar);</span><br><span class="line">                        /* </span><br><span class="line">                         * 把运算结果再次放入数字栈中</span><br><span class="line">                         * </span><br><span class="line">                         */</span><br><span class="line">                        numStack.push(result);</span><br><span class="line">                        /* </span><br><span class="line">                         * 符号</span><br><span class="line">                         */</span><br><span class="line">                        symbolStack.push(c);</span><br><span class="line">                    &#125;<span class="keyword">else</span>&#123;</span><br><span class="line">                        symbolStack.push(c);</span><br><span class="line">                    &#125;</span><br><span class="line">                &#125;<span class="keyword">else</span></span><br><span class="line">                &#123;</span><br><span class="line">                    /* 如果是空栈，则符号压栈 */</span><br><span class="line">                    symbolStack.push(c);</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;<span class="keyword">else</span>&#123;</span><br><span class="line">                //eg:33+44</span><br><span class="line">                values+=c;//字符串拼接</span><br><span class="line">                <span class="keyword">if</span>(i==length-1)</span><br><span class="line">                &#123;</span><br><span class="line">                    numStack.push(Integer.parseInt(values));</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="keyword">else</span>&#123;</span><br><span class="line">                    char data=str.substring(i+1, i+2).charAt(0);</span><br><span class="line">                    <span class="keyword">if</span>(symbolStack.isOper(data))&#123;</span><br><span class="line">                        numStack.push(Integer.parseInt(values));</span><br><span class="line">                        values = <span class="string">&quot;&quot;</span>;</span><br><span class="line">                    &#125;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">while</span>(<span class="literal">true</span>)</span><br><span class="line">        &#123;</span><br><span class="line">            <span class="keyword">if</span>(symbolStack.isEmpty())</span><br><span class="line">            &#123;</span><br><span class="line">                <span class="built_in">break</span>;</span><br><span class="line">            &#125;</span><br><span class="line">            temp1 =numStack.pop();</span><br><span class="line">            temp2 = numStack.pop();</span><br><span class="line">            symbolChar = symbolStack.pop();</span><br><span class="line">            result = numStack.calculate(temp1, temp2, symbolChar);</span><br><span class="line">            numStack.push(result);</span><br><span class="line">        &#125;</span><br><span class="line">        int res=numStack.pop();</span><br><span class="line">        System.out.println(<span class="string">&quot;结果是:&quot;</span>+res);</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
